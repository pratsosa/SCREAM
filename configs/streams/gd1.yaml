name: gd1

# Raw input for the normalizing flow (FITS file, stream-aligned coordinates)
raw_data_path: /pscratch/sd/p/pratsosa/GD-1_gaia_x_decals_stream_prep.fits

# Output of train_flow.py; input to train_em_cathode.py
generated_data_path: /pscratch/sd/p/pratsosa/GD1_SCREAM/generated/gd1_generated.csv

# Features consumed by the MLP DataModule (order matters — matches embeddings column order)
features:
  - ra
  - dec
  - pm_ra
  - pm_dec
  - gmag
  - color
  - rmag0
  - g_r
  - r_z

# Astrometric error features for EM-CATHODE marginalisation
error_features:
  - pm_ra_error
  - pm_dec_error

# Normalizing flow: data columns (all columns except the conditioning column)
flow_data_columns:
  - ra
  - dec
  - pm_dec
  - pm_ra_error
  - pm_dec_error
  - gmag
  - color
  - rmag0
  - g_r
  - r_z

# Normalizing flow: conditioning column
flow_cond_columns:
  - pm_ra

# Signal region definition.
# null → use the pre-computed 'signal_region' boolean column in the raw FITS file.
# [low, high] → derive the signal region dynamically from pm_ra values.
pm_ra_signal_range: null

quality_cuts:
  parallax_max: 1.0
  color_min: 0.5
  color_max: 1.0
  gmag_max: 20.2
